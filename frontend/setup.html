<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup - BudgetSheet</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #A8D8EA 0%, #C9B8E8 50%, #B8E8D4 100%);
      --accent-color: #6366f1;
      --accent-hover: #4338ca;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.8);
      --glass-blur: blur(20px);
      --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      --color-text: #1f2937;
      --color-text-muted: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--color-text);
      padding: 24px;
      line-height: 1.5;
    }

    .setup-card {
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      box-shadow: var(--glass-shadow);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-box {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      font-size: 40px;
      color: var(--accent-color);
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15);
    }

    h1 { 
      font-size: 28px; 
      font-weight: 800; 
      margin-bottom: 16px; 
      letter-spacing: -0.025em;
      color: #111827;
    }
    
    p { 
      font-size: 16px; 
      color: var(--color-text-muted); 
      margin-bottom: 40px; 
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-setup {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--accent-color);
      border: none;
      width: 100%;
      padding: 16px 32px;
      border-radius: 16px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }

    .btn-setup:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.35);
    }

    .btn-setup:active { transform: translateY(0); }
    .btn-setup:disabled { 
      opacity: 0.7; 
      cursor: not-allowed; 
      transform: none;
      background: #9ca3af;
      box-shadow: none;
    }

    .status-msg { 
      margin-top: 24px; 
      font-size: 14px; 
      font-weight: 600; 
      min-height: 24px; 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .success { color: #059669; }
    .error { color: #dc2626; }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="setup-card">
    <div class="icon-box">
      <i class="ti ti-settings-automation"></i>
    </div>
    <h1>Inisialisasi BudgetSheet</h1>
    <p>Selamat datang! BudgetSheet perlu menyiapkan Spreadsheet dan folder Google Drive untuk pertama kali. Proses ini otomatis dan hanya perlu dilakukan sekali.</p>
    
    <button id="btn-run-setup" class="btn-setup">
      <span class="spinner" id="loader"></span>
      <span id="btn-text">Mulai Setup Sekarang</span>
    </button>

    <div id="status" class="status-msg"></div>
  </div>

  <script>
    const btn = document.getElementById('btn-run-setup');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btn-text');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      btn.disabled = true;
      loader.style.display = 'inline-block';
      btnText.textContent = 'Memproses...';
      status.textContent = '';
      status.className = 'status-msg';

      google.script.run
        .withSuccessHandler((res) => {
          if (res && res.success) {
            status.textContent = '✓ Setup Berhasil! Mengalihkan...';
            status.className = 'status-msg success';
            setTimeout(() => {
              window.location.reload();
            }, 2000);
          } else {
            handleError(res ? res.error : 'Terjadi kesalahan yang tidak diketahui');
          }
        })
        .withFailureHandler((err) => {
          handleError(err.message);
        })
        .setupSystem();
    });

    function handleError(msg) {
      btn.disabled = false;
      loader.style.display = 'none';
      btnText.textContent = 'Coba Lagi';
      status.textContent = '❌ ' + msg;
      status.className = 'status-msg error';
    }
  </script>
</body>
</html>
